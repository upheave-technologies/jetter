<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Jet ski icon">
  <!-- Background: rounded square in Adriatic teal -->
  <rect width="32" height="32" rx="7" ry="7" fill="#1a7a8a"/>

  <!-- Hull — wide wedge, nose pointing right -->
  <path d="M4 20 Q5 17 10 16 L26 15 Q28 15 28 17 Q27 19 24 20 Z" fill="#ffffff"/>

  <!-- Hull underside / keel line -->
  <path d="M4 20 Q8 22 16 22 Q22 22 26 20 Z" fill="#d4eef2"/>

  <!-- Deck / body of the craft -->
  <path d="M10 16 Q11 13 15 12 L20 12 Q22 12 23 13 L26 15 Z" fill="#e8f7fa"/>

  <!-- Rider torso — bold dome -->
  <ellipse cx="15" cy="11.5" rx="3" ry="3.5" fill="#ffffff"/>

  <!-- Rider head -->
  <circle cx="15" cy="8.5" r="2.2" fill="#ffffff"/>

  <!-- Handlebars — thick bar, readable at small size -->
  <rect x="17.5" y="10" width="5" height="1.8" rx="0.9" fill="#ffffff"/>

  <!-- Rooster tail spray — three bold arcs -->
  <path d="M26 15 Q30 11 29 8" stroke="#d4eef2" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M26 16 Q31 14 31 11" stroke="#d4eef2" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M26 17 Q30 16 30 14" stroke="#d4eef2" stroke-width="1.2" stroke-linecap="round" fill="none"/>
</svg>
